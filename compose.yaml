services:
  apparently.db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: AppaRentlyDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - apparently-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d AppaRentlyDb"]
      interval: 5s
      timeout: 5s
      retries: 10

  apparently.web.client:
    image: apparently.web.client
    build:
      context: .
      dockerfile: AppaRently.Web/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AppaRentlyDb: Host=apparently.db;Port=5432;Database=AppaRentlyDb;Username=postgres;Password=postgres
    volumes:
      - apparently-dp-keys:/home/app/.aspnet/DataProtection-Keys
    depends_on:
      apparently.db:
        condition: service_healthy

  apparently.web.owner:
    image: apparently.web.owner
    build:
      context: .
      dockerfile: AppaRently.Web.Owner/Dockerfile
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AppaRentlyDb: Host=apparently.db;Port=5432;Database=AppaRentlyDb;Username=postgres;Password=postgres
    volumes:
      - apparently-dp-keys:/home/app/.aspnet/DataProtection-Keys
    depends_on:
      apparently.db:
        condition: service_healthy

  apparently.web.superadmin:
    image: apparently.web.superadmin
    build:
      context: .
      dockerfile: AppaRently.Web.SuperAdmin/Dockerfile
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AppaRentlyDb: Host=apparently.db;Port=5432;Database=AppaRentlyDb;Username=postgres;Password=postgres
    volumes:
      - apparently-dp-keys:/home/app/.aspnet/DataProtection-Keys
    depends_on:
      apparently.db:
        condition: service_healthy

volumes:
  apparently-db-data:
  apparently-dp-keys:
